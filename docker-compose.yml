services:
  realbehind:
    build: .
    container_name: realbehind-funnel
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      LEADS_DB_PATH: /app/data/leads.db
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./data:/app/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  web:
    external: true
